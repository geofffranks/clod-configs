version: 2
tui:
  theme: dark
  status-line:
    - kind: cwd
    - kind: source-control
    - kind: facet
    - kind: model
    - kind: permissions
    - kind: context-usage

# MCP servers. Commands are bare names (PATH-resolved) so the same config works
# on the host (darwin binaries on PATH) and in the container (linux binaries at
# /home/dev/.local/bin). Secrets (e.g. FOUNDRY_API_KEY) are intentionally NOT
# committed — they live in your installed config.yaml, which the installer
# preserves. After installing, remove the old `localhost_vision` entry by hand.
mcp_servers:
  # Host-only: absolute path to a Python script, so this entry does NOT work in
  # the linux container. For container portability, put a `clod-subagent-mcp`
  # wrapper on PATH and use that as a bare `command` instead.
  clod-subagent:
    args:
      - /home/dev/workspace/clod-mcp/clod_subagent_mcp.py
    command: python3
    env:
      # Long-lived OAuth token (from `claude setup-token`) so the spawned
      # `claude` CLI authenticates headlessly. run.sh injects it from the
      # host env file (~/.config/polytoken-container.env) or POLY_PASS_ENV.
      CLAUDE_CODE_OAUTH_TOKEN: $CLAUDE_CODE_OAUTH_TOKEN
    transport: stdio
  foundry:
    args: []
    command: foundry-mcp
    env:
      FOUNDRY_RELAY_URL: http://192.168.2.247:3010
    transport: stdio
  codex-imagegen:
    args: []
    command: codex-imagegen-mcp
    env:
      CODEX_BIN: codex
    transport: stdio
  minime_vision:
    args: []
    command: minime-vision
    env:
      LM_STUDIO_URL: http://192.168.2.247:1234
    transport: stdio
